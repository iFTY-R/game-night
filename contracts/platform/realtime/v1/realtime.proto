syntax = "proto3";

package platform.realtime.v1;

import "google/protobuf/timestamp.proto";
import "platform/game/v1/game.proto";

option go_package = "github.com/iFTY-R/game-night/contracts/gen/go/platform/realtime/v1;realtimev1";

// OwnerService is reachable only on the private realtime listener and requires service authentication.
service OwnerService {
  rpc ResolveOwner(ResolveOwnerRequest) returns (ResolveOwnerResponse);
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);
  rpc GameAction(GameActionRequest) returns (GameActionResponse);
  rpc GameSystem(GameSystemRequest) returns (GameSystemResponse);
  rpc GameTimer(GameTimerRequest) returns (GameTimerResponse);
  rpc GetProjection(GetProjectionRequest) returns (GetProjectionResponse);
  rpc GetEventProjection(GetEventProjectionRequest) returns (GetEventProjectionResponse);
  rpc GetReplayProjection(GetReplayProjectionRequest) returns (GetReplayProjectionResponse);
}

message ResolveOwnerRequest {
  string session_id = 1;
  bool allow_owner_acquire = 2;
}

message ResolveOwnerResponse {
  string instance_id = 1;
  string address = 2;
  uint64 ownership_epoch = 3;
}

// StartSessionRequest contains the API-authenticated actor and canonical optimistic start command.
message StartSessionRequest {
  string actor_user_id = 1;
  string room_id = 2;
  string game_id = 3;
  uint64 expected_room_version = 4;
  uint64 expected_membership_version = 5;
  platform.game.v1.GameConfig config = 6;
  string operation_id = 7;
  bytes request_digest = 8;
}

message StartSessionResponse {
  RoomSnapshot room = 1;
  SessionSnapshot session = 2;
}

// GameActionRequest deliberately omits ownership_epoch; only the receiving owner may select it.
message GameActionRequest {
  string actor_user_id = 1;
  string session_id = 2;
  string action_id = 3;
  uint64 expected_state_version = 4;
  platform.game.v1.GameEnvelope command = 5;
  bytes request_digest = 6;
  bool allow_owner_acquire = 7;
}

message GameActionResponse {
  SessionSnapshot session = 1;
  ActionReceipt receipt = 2;
  platform.game.v1.GameProjection projection = 3;
  bool replayed = 4;
}

message GameSystemRequest {
  string session_id = 1;
  string operation_id = 2;
  string source_kind = 3;
  string source_event_id = 4;
  string requested_by_user_id = 5;
  uint64 expected_state_version = 6;
  platform.game.v1.GameEnvelope command = 7;
  bytes request_digest = 8;
  bool allow_owner_acquire = 9;
}

message GameSystemResponse {
  SessionSnapshot session = 1;
  SystemReceipt receipt = 2;
  bool replayed = 3;
  bool retry = 4;
}

message GameTimerRequest {
  string session_id = 1;
  string timer_id = 2;
  uint64 expected_state_version = 3;
  google.protobuf.Timestamp due_at = 4;
  platform.game.v1.GameEnvelope timer = 5;
  bool allow_owner_acquire = 6;
}

message GameTimerResponse {
  SessionSnapshot session = 1;
  TimerReceipt receipt = 2;
  bool replayed = 3;
}

message Viewer {
  platform.game.v1.ViewerKind kind = 1;
  string user_id = 2;
  uint32 seat_index = 3;
}

message GetProjectionRequest {
  string session_id = 1;
  Viewer viewer = 2;
}

message GetProjectionResponse {
  SessionSnapshot session = 1;
  platform.game.v1.GameProjection projection = 2;
}

message GetEventProjectionRequest {
  string session_id = 1;
  uint64 after_state_version = 2;
  Viewer viewer = 3;
}

message GetEventProjectionResponse {
  SessionSnapshot session = 1;
  repeated platform.game.v1.GameEnvelope messages = 2;
  platform.game.v1.GameProjection snapshot_fallback = 3;
  bool used_snapshot_fallback = 4;
}

message GetReplayProjectionRequest {
  string session_id = 1;
  Viewer viewer = 2;
  string access_policy = 3;
}

message GetReplayProjectionResponse {
  SessionSnapshot session = 1;
  platform.game.v1.GameProjection projection = 2;
}

// RoomSnapshot is private service data used to preserve the existing API transport contract.
message RoomSnapshot {
  string room_id = 1;
  string room_code = 2;
  string visibility = 3;
  string status = 4;
  string host_user_id = 5;
  uint32 participant_capacity = 6;
  string participant_admission = 7;
  string spectator_admission = 8;
  repeated RoomMember members = 9;
  string active_session_id = 10;
  string active_game_id = 11;
  uint64 room_version = 12;
  uint64 membership_version = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
}

message RoomMember {
  string user_id = 1;
  string role = 2;
  string requested_role = 3;
  uint32 seat_index = 4;
  google.protobuf.Timestamp joined_at = 5;
  google.protobuf.Timestamp last_seen_at = 6;
}

// SessionSnapshot is never registered on the public listener or written to WebSocket frames.
message SessionSnapshot {
  string session_id = 1;
  string room_id = 2;
  string game_id = 3;
  platform.game.v1.VersionTuple version = 4;
  uint64 ownership_epoch = 5;
  repeated Participant participants = 6;
  uint32 snapshot_version = 7;
  uint64 state_version = 8;
  platform.game.v1.GameEnvelope authoritative_state = 9;
  repeated Timer timers = 10;
  google.protobuf.Timestamp next_deadline_at = 11;
  platform.game.v1.GameSessionStatus status = 12;
  google.protobuf.Timestamp started_at = 13;
  google.protobuf.Timestamp updated_at = 14;
  google.protobuf.Timestamp ended_at = 15;
}

message Participant {
  string user_id = 1;
  uint32 seat_index = 2;
}

message Timer {
  string timer_id = 1;
  uint64 expected_state_version = 2;
  google.protobuf.Timestamp due_at = 3;
  platform.game.v1.GameEnvelope message = 4;
}

message ActionReceipt {
  string session_id = 1;
  string actor_user_id = 2;
  string action_id = 3;
  bytes request_digest = 4;
  string result_code = 5;
  bytes result_digest = 6;
  uint64 state_version = 7;
  google.protobuf.Timestamp committed_at = 8;
}

message TimerReceipt {
  string session_id = 1;
  string timer_id = 2;
  uint64 expected_state_version = 3;
  string result_code = 4;
  bytes result_digest = 5;
  uint64 state_version = 6;
  google.protobuf.Timestamp committed_at = 7;
}

message SystemReceipt {
  string session_id = 1;
  string operation_id = 2;
  string source_kind = 3;
  string source_event_id = 4;
  string requested_by_user_id = 5;
  bytes request_digest = 6;
  string result_code = 7;
  bytes result_digest = 8;
  uint64 state_version = 9;
  google.protobuf.Timestamp committed_at = 10;
}
