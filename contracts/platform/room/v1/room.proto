syntax = "proto3";

package platform.room.v1;

import "google/protobuf/timestamp.proto";
import "platform/common/v1/common.proto";
import "platform/game/v1/game.proto";

option go_package = "github.com/iFTY-R/game-night/contracts/gen/go/platform/room/v1;roomv1";

// RoomService owns continuous PartyRoom membership and host-controlled admission.
service RoomService {
  rpc CreateRoom(CreateRoomRequest) returns (CreateRoomResponse);
  rpc GetRoom(GetRoomRequest) returns (GetRoomResponse);
  rpc HeartbeatRoom(HeartbeatRoomRequest) returns (HeartbeatRoomResponse);
  rpc ListMyRooms(ListMyRoomsRequest) returns (ListMyRoomsResponse);
  rpc ListPublicRooms(ListPublicRoomsRequest) returns (ListPublicRoomsResponse);
  rpc JoinRoom(JoinRoomRequest) returns (JoinRoomResponse);
  rpc ApproveMember(ApproveMemberRequest) returns (ApproveMemberResponse);
  rpc SetAdmission(SetAdmissionRequest) returns (SetAdmissionResponse);
  rpc StartGame(StartGameRequest) returns (StartGameResponse);
  rpc FinishGame(FinishGameRequest) returns (FinishGameResponse);
  rpc RemoveMember(RemoveMemberRequest) returns (RemoveMemberResponse);
  rpc CloseRoom(CloseRoomRequest) returns (CloseRoomResponse);
}

enum RoomVisibility {
  ROOM_VISIBILITY_UNSPECIFIED = 0;
  ROOM_VISIBILITY_PRIVATE = 1;
  ROOM_VISIBILITY_PUBLIC = 2;
}

enum RoomStatus {
  ROOM_STATUS_UNSPECIFIED = 0;
  ROOM_STATUS_LOBBY = 1;
  ROOM_STATUS_PLAYING = 2;
  ROOM_STATUS_CLOSED = 3;
  ROOM_STATUS_POST_GAME = 4;
}

enum AdmissionMode {
  ADMISSION_MODE_UNSPECIFIED = 0;
  ADMISSION_MODE_OPEN = 1;
  ADMISSION_MODE_APPROVAL = 2;
  ADMISSION_MODE_CLOSED = 3;
}

enum MemberRole {
  MEMBER_ROLE_UNSPECIFIED = 0;
  MEMBER_ROLE_PARTICIPANT = 1;
  MEMBER_ROLE_SPECTATOR = 2;
  MEMBER_ROLE_WAITING = 3;
}

enum JoinIntent {
  JOIN_INTENT_UNSPECIFIED = 0;
  JOIN_INTENT_PARTICIPANT = 1;
  JOIN_INTENT_SPECTATOR = 2;
}

// PublicRoomPrimaryAction is computed against current state and the authenticated viewer.
enum PublicRoomPrimaryAction {
  PUBLIC_ROOM_PRIMARY_ACTION_UNSPECIFIED = 0;
  PUBLIC_ROOM_PRIMARY_ACTION_ENTER_ROOM = 1;
  PUBLIC_ROOM_PRIMARY_ACTION_JOIN = 2;
  PUBLIC_ROOM_PRIMARY_ACTION_REQUEST_JOIN = 3;
  PUBLIC_ROOM_PRIMARY_ACTION_SPECTATE = 4;
  PUBLIC_ROOM_PRIMARY_ACTION_REQUEST_SPECTATE = 5;
  PUBLIC_ROOM_PRIMARY_ACTION_WAIT_FOR_HOST = 6;
  PUBLIC_ROOM_PRIMARY_ACTION_IN_PROGRESS = 7;
  PUBLIC_ROOM_PRIMARY_ACTION_FULL = 8;
}

message RoomVersion {
  uint64 room_version = 1;
  uint64 membership_version = 2;
}

message RoomMember {
  string user_id = 1;
  MemberRole role = 2;
  MemberRole requested_role = 3;
  uint32 seat_index = 4;
  google.protobuf.Timestamp joined_at = 5;
  google.protobuf.Timestamp last_seen_at = 6;
  string username = 7;
}

message Room {
  string room_id = 1;
  string room_code = 2;
  RoomVisibility visibility = 3;
  RoomStatus status = 4;
  string host_user_id = 5;
  uint32 participant_capacity = 6;
  AdmissionMode participant_admission = 7;
  AdmissionMode spectator_admission = 8;
  repeated RoomMember members = 9;
  string active_session_id = 10;
  string active_game_id = 11;
  RoomVersion version = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
  string last_finished_session_id = 15;
  string last_finished_game_id = 16;
}

message CreateRoomRequest {
  RoomVisibility visibility = 1;
  uint32 participant_capacity = 2;
  AdmissionMode participant_admission = 3;
  AdmissionMode spectator_admission = 4;
}

message CreateRoomResponse {
  Room room = 1;
}

message GetRoomRequest {
  string room_id = 1;
  string room_code = 2;
}

message GetRoomResponse {
  Room room = 1;
}

message HeartbeatRoomRequest {
  string room_id = 1;
}

message HeartbeatRoomResponse {
  google.protobuf.Timestamp observed_at = 1;
}

// MyRoomCard includes invitation and membership fields because the authenticated viewer already belongs to the room.
message MyRoomCard {
  string room_id = 1;
  string room_code = 2;
  RoomVisibility visibility = 3;
  string host_username = 4;
  RoomStatus status = 5;
  bool is_host = 6;
  uint32 participant_capacity = 7;
  uint32 participant_count = 8;
  uint32 spectator_count = 9;
  uint32 waiting_count = 10;
  AdmissionMode participant_admission = 11;
  AdmissionMode spectator_admission = 12;
  string active_game_id = 13;
  string last_finished_game_id = 14;
  MemberRole viewer_role = 15;
  MemberRole viewer_requested_role = 16;
  google.protobuf.Timestamp updated_at = 17;
}

message ListMyRoomsRequest {
  platform.common.v1.PageRequest page = 1;
}

message ListMyRoomsResponse {
  repeated MyRoomCard rooms = 1;
  platform.common.v1.PageInfo page = 2;
}

// PublicRoomFilter supports the stable discovery facets currently backed by authoritative room state.
message PublicRoomFilter {
  repeated RoomStatus statuses = 1;
  string game_id = 2;
  bool participant_joinable_only = 3;
}

// PublicRoomCard excludes invitation codes, real names, and other players' membership details.
message PublicRoomCard {
  string room_id = 1;
  string host_username = 2;
  RoomStatus status = 3;
  uint32 participant_capacity = 4;
  uint32 participant_count = 5;
  uint32 spectator_count = 6;
  uint32 waiting_count = 7;
  AdmissionMode participant_admission = 8;
  AdmissionMode spectator_admission = 9;
  string active_game_id = 10;
  MemberRole viewer_role = 11;
  MemberRole viewer_requested_role = 12;
  PublicRoomPrimaryAction primary_action = 13;
  google.protobuf.Timestamp updated_at = 14;
}

message ListPublicRoomsRequest {
  PublicRoomFilter filter = 1;
  platform.common.v1.PageRequest page = 2;
}

message ListPublicRoomsResponse {
  repeated PublicRoomCard rooms = 1;
  platform.common.v1.PageInfo page = 2;
}

message JoinRoomRequest {
  string room_id = 1;
  JoinIntent intent = 2;
  RoomVersion expected_version = 3;
  string room_code = 4;
}

message JoinRoomResponse {
  Room room = 1;
  RoomMember member = 2;
  bool created = 3;
  bool changed = 4;
}

message ApproveMemberRequest {
  string room_id = 1;
  string user_id = 2;
  RoomVersion expected_version = 3;
}

message ApproveMemberResponse {
  Room room = 1;
  RoomMember member = 2;
}

message SetAdmissionRequest {
  string room_id = 1;
  AdmissionMode participant_admission = 2;
  AdmissionMode spectator_admission = 3;
  RoomVersion expected_version = 4;
}

message SetAdmissionResponse {
  Room room = 1;
}

message StartGameRequest {
  string room_id = 1;
  string game_id = 2;
  platform.game.v1.GameConfig config = 3;
  RoomVersion expected_version = 4;
  string operation_id = 5;
  bytes request_digest = 6;
}

message FrozenParticipant {
  string user_id = 1;
  uint32 seat_index = 2;
}

message StartGameResponse {
  Room room = 1;
  string session_id = 2;
  string game_id = 3;
  repeated FrozenParticipant participants = 4;
}

message FinishGameRequest {
  string room_id = 1;
  string session_id = 2;
  RoomVersion expected_version = 3;
  string operation_id = 4;
  string source_event_id = 5;
  uint64 expected_state_version = 6;
  platform.game.v1.GameEnvelope command = 7;
  bytes request_digest = 8;
}

message FinishGameResponse {
  Room room = 1;
}

message RemoveMemberRequest {
  string room_id = 1;
  string user_id = 2;
  RoomVersion expected_version = 3;
}

message RemoveMemberResponse {
  Room room = 1;
  RoomMember removed = 2;
  bool participant_revoked = 3;
  string active_session_id = 4;
  string source_event_id = 5;
}

message CloseRoomRequest {
  string room_id = 1;
  RoomVersion expected_version = 2;
}

message CloseRoomResponse {
  Room room = 1;
}
