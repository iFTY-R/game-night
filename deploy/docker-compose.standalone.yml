# Game Night standalone deployment
# Runs one application container. PostgreSQL, Redis, and S3 must be provided externally.

services:
  game-night:
    image: ${GAME_NIGHT_IMAGE:-ghcr.io/ifty-r/game-night:latest}
    container_name: game-night
    command: ["serve-all"]
    restart: unless-stopped
    stop_grace_period: ${GAME_NIGHT_STOP_GRACE_PERIOD:-65s}
    ports:
      - "${GAME_NIGHT_HTTP_BIND_ADDRESS:-127.0.0.1}:${GAME_NIGHT_HTTP_PUBLISHED_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - type: bind
        source: ${GAME_NIGHT_API_SECRETS_DIR:-./secrets}
        target: /run/game-night/api-secrets
        read_only: true
      - type: bind
        source: ${GAME_NIGHT_WORKER_SECRETS_DIR:-./secrets}
        target: /run/game-night/worker-secrets
        read_only: true
    environment:
      GAME_NIGHT_ENVIRONMENT: ${GAME_NIGHT_ENVIRONMENT:-development}
      GAME_NIGHT_DATABASE_SCHEMA: ${GAME_NIGHT_DATABASE_SCHEMA:-game_night}
      GAME_NIGHT_REDIS_URL: ${GAME_NIGHT_REDIS_URL:?GAME_NIGHT_REDIS_URL is required}
      GAME_NIGHT_REDIS_KEY_PREFIX: ${GAME_NIGHT_REDIS_KEY_PREFIX:-game-night:compose:}
      GAME_NIGHT_REDIS_TIMEOUT: ${GAME_NIGHT_REDIS_TIMEOUT:-1s}
      GAME_NIGHT_USER_ORIGINS: ${GAME_NIGHT_USER_ORIGINS:-http://localhost:8080}
      GAME_NIGHT_ADMIN_ORIGINS: ${GAME_NIGHT_ADMIN_ORIGINS:-http://admin.localhost:8080}
      GAME_NIGHT_TRUSTED_PROXY_CIDRS: ${GAME_NIGHT_TRUSTED_PROXY_CIDRS:-127.0.0.1/32,::1/128}
      GAME_NIGHT_COOKIE_SECURE: ${GAME_NIGHT_COOKIE_SECURE:-false}

      GAME_NIGHT_CHECKPOINT_SINK: s3
      GAME_NIGHT_CHECKPOINT_S3_REGION: ${GAME_NIGHT_CHECKPOINT_S3_REGION:-us-east-1}
      GAME_NIGHT_CHECKPOINT_S3_BUCKET: ${GAME_NIGHT_CHECKPOINT_S3_BUCKET:?GAME_NIGHT_CHECKPOINT_S3_BUCKET is required}
      GAME_NIGHT_CHECKPOINT_S3_ENDPOINT: ${GAME_NIGHT_CHECKPOINT_S3_ENDPOINT:?GAME_NIGHT_CHECKPOINT_S3_ENDPOINT is required}
      GAME_NIGHT_CHECKPOINT_S3_RETENTION: ${GAME_NIGHT_CHECKPOINT_S3_RETENTION:-8760h}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}

      # serve-all maps each DSN to the matching child process.
      GAME_NIGHT_API_DATABASE_URL: ${GAME_NIGHT_API_DATABASE_URL:?GAME_NIGHT_API_DATABASE_URL is required}
      GAME_NIGHT_REALTIME_DATABASE_URL: ${GAME_NIGHT_REALTIME_DATABASE_URL:?GAME_NIGHT_REALTIME_DATABASE_URL is required}
      GAME_NIGHT_WORKER_DATABASE_URL: ${GAME_NIGHT_WORKER_DATABASE_URL:?GAME_NIGHT_WORKER_DATABASE_URL is required}
      GAME_NIGHT_MIGRATION_DATABASE_URL: ${GAME_NIGHT_MIGRATION_DATABASE_URL:?GAME_NIGHT_MIGRATION_DATABASE_URL is required}
      GAME_NIGHT_API_KEYRING_DIRECTORY: /run/game-night/api-secrets
      GAME_NIGHT_WORKER_KEYRING_DIRECTORY: /run/game-night/worker-secrets
      GAME_NIGHT_API_BOOTSTRAP_SECRET_FILE: /run/game-night/api-secrets/admin-bootstrap.txt

      GAME_NIGHT_API_LISTEN_ADDRESS: 127.0.0.1:8081
      GAME_NIGHT_API_REALTIME_BOOTSTRAP_URL: http://127.0.0.1:8091
      GAME_NIGHT_API_REALTIME_PEER_URLS: http://127.0.0.1:8091
      GAME_NIGHT_API_REALTIME_INTERNAL_TOKEN: ${GAME_NIGHT_REALTIME_INTERNAL_TOKEN:?GAME_NIGHT_REALTIME_INTERNAL_TOKEN is required}
      GAME_NIGHT_AUDIT_CHECKPOINT_MAX_EVENTS: ${GAME_NIGHT_AUDIT_CHECKPOINT_MAX_EVENTS:-100}
      GAME_NIGHT_AUDIT_CHECKPOINT_MAX_INTERVAL: ${GAME_NIGHT_AUDIT_CHECKPOINT_MAX_INTERVAL:-5m}

      GAME_NIGHT_REALTIME_PUBLIC_LISTEN_ADDRESS: 127.0.0.1:8090
      GAME_NIGHT_REALTIME_INTERNAL_LISTEN_ADDRESS: 127.0.0.1:8091
      GAME_NIGHT_REALTIME_ADVERTISED_URL: http://127.0.0.1:8091
      GAME_NIGHT_REALTIME_INSTANCE_ID: ${GAME_NIGHT_REALTIME_INSTANCE_ID:-realtime-standalone}
      GAME_NIGHT_REALTIME_INTERNAL_TOKEN: ${GAME_NIGHT_REALTIME_INTERNAL_TOKEN:?GAME_NIGHT_REALTIME_INTERNAL_TOKEN is required}

      GAME_NIGHT_EDGE_LISTEN_ADDRESS: ":8080"
      GAME_NIGHT_EDGE_API_UPSTREAM_URL: http://127.0.0.1:8081
      GAME_NIGHT_EDGE_REALTIME_UPSTREAM_URL: http://127.0.0.1:8090
      GAME_NIGHT_EDGE_STATIC_DIRECTORY: /app/web
      GAME_NIGHT_EDGE_TRUSTED_PROXY_CIDRS: ${GAME_NIGHT_EDGE_TRUSTED_PROXY_CIDRS:-127.0.0.1/32,::1/128}

      GAME_NIGHT_WORKER_INSTANCE_ID: ${GAME_NIGHT_WORKER_INSTANCE_ID:-worker-standalone}
      GAME_NIGHT_WORKER_LEASE_DURATION: ${GAME_NIGHT_WORKER_LEASE_DURATION:-1m}
      GAME_NIGHT_WORKER_BATCH_SIZE: ${GAME_NIGHT_WORKER_BATCH_SIZE:-10}
      GAME_NIGHT_WORKER_POLL_INTERVAL: ${GAME_NIGHT_WORKER_POLL_INTERVAL:-1s}
      GAME_NIGHT_ROOM_IDLE_TIMEOUT: ${GAME_NIGHT_ROOM_IDLE_TIMEOUT:-10m}
    healthcheck:
      test: ["CMD", "game-night", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s
