version: v2
clean: true
plugins:
  - local: ["go", "run", "google.golang.org/protobuf/cmd/protoc-gen-go"]
    out: games/meet-by-chance/gen/go
    opt:
      - paths=source_relative
  - local: ["pnpm", "exec", "protoc-gen-es"]
    out: games/meet-by-chance/client/src/generated
    opt:
      - target=ts
